name: Build and Test

on:
  push:
    branches:
      - "*"
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: true

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: fantomas
        run: |
          dotnet tool restore
          dotnet fantomas --check src/

      - run: dotnet restore
      - run: dotnet build --configuration Release --no-restore --warnaserror
